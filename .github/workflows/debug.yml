name: debug

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "apks/**"
      - "README.md"
      - "CHANGELOG.md"
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # 【优化点 2】导出变量
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Module.prop
        run: |
          # 【优化点 1】优化 sed 效率
          RAW_VER=$(grep 'version=' module.prop | cut -d= -f2)
          NEW_VER="${RAW_VER}($(git rev-parse --short HEAD))"
          sed -i "s/^version=.*/version=${NEW_VER}/" module.prop
          sed -i "s/^versionCode=.*/versionCode=$(date +%Y%m%d)/" module.prop

      - name: Get Version
        id: get_version
        run: |
          echo "version=$(grep -oP 'version=\K[^ ]+' module.prop)" >> "$GITHUB_OUTPUT"

      - name: Generate Asset
        run: |
          # 不再往系统根目录写，写在当前工作目录下，防止插件没权限读取
          mkdir -p ./box_for_root_dir
          cp -r --parents $(find ./ -type f ! -path './.git/*' ! -name 'CHANGELOG.md' ! -name 'update.json' ! -name 'build.sh' ! -path './.github/*' ! -path './apks/*') ./box_for_root_dir/

      - name: Upload Debug Asset
        uses: actions/upload-artifact@v4
        with:
          name: box_root_files
          path: ./box_for_root_dir/
          include-hidden-files: true

  upload:
    runs-on: ubuntu-latest
    needs: build
    if: contains(github.event.head_commit.message, '[ci]')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 【优化点 4】下载到当前目录，避开 EACCES 权限问题
      - name: Download Asset
        uses: actions/download-artifact@v4
        with:
          name: box_root_files
          path: ./box_for_root_dir

      - name: Run zip
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          # 进入下载好的目录进行压缩，确保 bin 文件夹在压缩包根目录
          cd ./box_for_root_dir
          zip -r -o -X -ll "../box_for_root-${VERSION}.zip" ./

      - name: Upload to GitHub Pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          FILE=$(find . -name "box_for_root-*.zip")
          gh release create "pre-${VERSION}" "$FILE" \
            --prerelease \
            --title "Pre-release ${VERSION}" \
            --notes "pre-release build from commit $(git log -1 --pretty=%h)"

      - name: Upload to Telegram
        env:
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MESSAGE_THREAD_ID: ${{ secrets.MESSAGE_THREAD_ID }}
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          if [ -n "${{ secrets.BOT_TOKEN }}" ]; then
            VERSION="${{ needs.build.outputs.version }}"
            FILE=$(find . -name "box_for_root-*.zip")
            pip3 install telethon==1.31.1
            python3 .github/boxrootbot.py "$FILE"
          fi
