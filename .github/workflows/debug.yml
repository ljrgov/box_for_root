name: debug

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "apks/**"
      - "README.md"
      - "CHANGELOG.md"
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Module.prop
        run: |
          sed -i "s/$(grep -oP 'version=\K[^ ]+' module.prop)/$(cat module.prop | grep 'version=' | awk -F '=' '{print $2}')($(git log --oneline -n 1 | awk '{print $1}'))/g" module.prop
          sed -i "s/versionCode=.*/versionCode=$(date +%Y%m%d)/g" module.prop

      - name: Get Version
        id: get_version
        run: |
          echo "version=$(grep -oP 'version=\K[^ ]+' module.prop)" >> "$GITHUB_OUTPUT"

      - name: Generate Asset
        run: |
          sudo mkdir -p /box_for_root
          sudo cp -r --parents $(find ./ -type f ! -path './.git/*' ! -name 'CHANGELOG.md' ! -name 'LICENSE' ! -name 'update.json' ! -name 'build.sh' ! -path './.github/*' ! -path './apks/*')  /box_for_root/

      - name: Upload Debug Asset => (box_for_root_${{ steps.get_version.outputs.version }})
        uses: actions/upload-artifact@v4
        with:
          name: "box_for_root_${{ steps.get_version.outputs.version }}"
          path: /box_for_root/

  upload:
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for [ci] in commit message
        id: check_ci
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Last commit message: $COMMIT_MSG"
          if [[ "$COMMIT_MSG" == *"[ci]"* ]]; then
            echo "should_upload=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_upload=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run build
        if: steps.check_ci.outputs.should_upload == 'true'
        run: |
          sed -i "s/$(grep -oP 'version=\K[^ ]+' module.prop)/$(cat module.prop | grep 'version=' | awk -F '=' '{print $2}')($(git log --oneline -n 1 | awk '{print $1}'))/g" module.prop
          zip -r -o -X -ll box_for_root-$(cat module.prop | grep 'version=' | awk -F '=' '{print $2}').zip ./ \
            -x '.git/*' -x 'CHANGELOG.md' -x 'LICENSE' -x 'update.json' -x 'build.sh' -x '.github/*' -x 'apks/*'

      - name: Upload to GitHub Pre-release
        if: steps.check_ci.outputs.should_upload == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cat module.prop | grep 'version=' | awk -F '=' '{print $2}')
          FILE=$(find . -name "*.zip")
          gh release create "pre-${VERSION}" "$FILE" \
            --prerelease \
            --title "Pre-release ${VERSION}" \
            --notes "pre-release build from commit $(git log -1 --pretty=%h)"

      - name: Upload to Telegram (Debug Mode)
        env:
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MESSAGE_THREAD_ID: ${{ secrets.MESSAGE_THREAD_ID }}
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          # 从模块文件提取版本号
          export VERSION=$(grep 'version=' module.prop | awk -F '=' '{print $2}')
          
          # 自动获取当前提交的短哈希 (指纹)
          export COMMIT=$(git rev-parse --short HEAD)
          
          # 获取当前时间
          export DATE=$(TZ='Asia/Shanghai' date "+%Y-%m-%d %H:%M")
          
          # 获取最后一条 commit message 作为日志，并用双引号包裹防止换行导致崩溃
          export CHANGELOG="$(git log -1 --pretty=%B | head -n 1)"
          
          # 查找生成的 zip 文件
          FILE=$(find . -name "*.zip" | head -n 1)
          
          if [ -z "$FILE" ]; then
            echo "[-] Error: No zip file found!"
            exit 1
          fi

          echo "[+] Preparing to upload: $FILE (Version: $VERSION, Commit: $COMMIT)"
          
          pip3 install --quiet telethon==1.31.1
          python3 .github/boxrootbot.py "$FILE"
