name: debug

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "apks/**"
      - "README.md"
      - "CHANGELOG.md"
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      commit: ${{ steps.get_version.outputs.commit }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update module.prop
        id: get_version
        run: |
          VERSION=$(grep -oP 'version=\K[^ ]+' module.prop)
          COMMIT=$(git log --oneline -n 1 | awk '{print $1}')
          sed -i "s/^version=.*/version=${VERSION}(${COMMIT})/" module.prop
          sed -i "s/^versionCode=.*/versionCode=$(date +%Y%m%d)/" module.prop
          echo "version=${VERSION}(${COMMIT})" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"

      - name: Generate Asset
        run: |
          mkdir -p /box_for_root
          find ./ -type f \
            ! -path './.git/*' \
            ! -name 'CHANGELOG.md' \
            ! -name 'update.json' \
            ! -name 'build.sh' \
            ! -path './.github/*' \
            ! -path './apks/*' \
            -print0 | xargs -0 -I{} cp --parents {} /box_for_root/

      - name: Upload Debug Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "box_for_root_${{ steps.get_version.outputs.version }}"
          path: /box_for_root/

  upload:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for [ci] in commit message
        id: check_ci
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Last commit message: $COMMIT_MSG"
          if [[ "$COMMIT_MSG" == *"[ci]"* ]]; then
            echo "should_upload=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_upload=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifact
        if: steps.check_ci.outputs.should_upload == 'true'
        uses: actions/download-artifact@v4
        with:
          name: "box_for_root_${{ needs.build.outputs.version }}"
          path: /box_for_root/

      - name: Package zip
        if: steps.check_ci.outputs.should_upload == 'true'
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          cd /box_for_root
          zip -r -o -X -ll "$GITHUB_WORKSPACE/box_for_root-${VERSION}.zip" ./

      - name: Upload to GitHub Pre-release
        if: steps.check_ci.outputs.should_upload == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          COMMIT="${{ needs.build.outputs.commit }}"
          TAG="pre-${VERSION}"
          FILE=$(find "$GITHUB_WORKSPACE" -maxdepth 1 -name "*.zip")
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" "$FILE" \
            --prerelease \
            --title "Pre-release ${VERSION}" \
            --notes "pre-release build from commit ${COMMIT}"

      - name: Setup Python
        if: steps.check_ci.outputs.should_upload == 'true' && secrets.BOT_TOKEN != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Upload to Telegram
        if: steps.check_ci.outputs.should_upload == 'true' && secrets.BOT_TOKEN != ''
        env:
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MESSAGE_THREAD_ID: ${{ secrets.MESSAGE_THREAD_ID }}
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          pip install telethon==1.31.1
          COMMIT_LOG=$(git log --oneline -n 5 --no-decorate | sed 's/^[0-9a-f]* //' | sed 's/^/— /')
          export COMMIT="$COMMIT_LOG"
          FILE=$(find "$GITHUB_WORKSPACE" -maxdepth 1 -name "*.zip")
          python3 "$GITHUB_WORKSPACE/.github/boxrootbot.py" "$FILE"
