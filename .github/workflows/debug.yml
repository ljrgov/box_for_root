name: debug

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "apks/**"
      - "README.md"
      - "CHANGELOG.md"
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Module.prop
        run: |
          RAW_VER=$(grep 'version=' module.prop | cut -d= -f2)
          NEW_VER="${RAW_VER}($(git rev-parse --short HEAD))"
          sed -i "s/^version=.*/version=${NEW_VER}/" module.prop
          sed -i "s/^versionCode=.*/versionCode=$(date +%Y%m%d)/" module.prop

      - name: Get Version
        id: get_version
        run: |
          echo "version=$(grep -oP 'version=\K[^ ]+' module.prop)" >> "$GITHUB_OUTPUT"

      - name: Generate Asset
        run: |
          sudo mkdir -p /box_for_root
          sudo cp -r --parents $(find ./ -type f ! -path './.git/*' ! -name 'CHANGELOG.md' ! -name 'LICENSE' ! -name 'update.json' ! -name 'build.sh' ! -path './.github/*' ! -path './apks/*') /box_for_root/

      - name: Upload Debug Asset
        uses: actions/upload-artifact@v4
        with:
          name: box_root_files
          path: /box_for_root/
          include-hidden-files: true

  upload:
    runs-on: ubuntu-latest
    needs: build
    # 判断是否 [ci]
    if: contains(github.event.head_commit.message, '[ci]')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Asset
        uses: actions/download-artifact@v4
        with:
          name: box_root_files
          path: /box_for_root

      - name: Run zip
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          cd /box_for_root
          # 确保在 /box_for_root 根目录下执行，防止 bin 文件夹层级丢失
          sudo zip -r -o -X -ll "/tmp/box_for_root-${VERSION}.zip" ./*

      - name: Upload to GitHub Pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          gh release create "pre-${VERSION}" "/tmp/box_for_root-${VERSION}.zip" \
            --prerelease \
            --title "Pre-release ${VERSION}" \
            --notes "pre-release build from commit $(git log -1 --pretty=%h)"

      - name: Upload to Telegram
        env:
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MESSAGE_THREAD_ID: ${{ secrets.MESSAGE_THREAD_ID }}
          # API_ID: ${{ secrets.API_ID }}
          # API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          if [ -n "${{ secrets.BOT_TOKEN }}" ]; then
            VERSION="${{ needs.build.outputs.version }}"
            pip3 install telethon==1.31.1
            python3 .github/boxrootbot.py "/tmp/box_for_root-${VERSION}.zip"
          fi
