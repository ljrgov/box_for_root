name: debug

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "apks/**"
      - "README.md"
      - "CHANGELOG.md"
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # 将版本号导出给其他 Job 使用
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Module.prop
        run: |
          # 简化 sed 逻辑，避免多次 grep
          CUR_VER=$(grep 'version=' module.prop | cut -d= -f2)
          GIT_HASH=$(git rev-parse --short HEAD)
          NEW_VER="${CUR_VER}(${GIT_HASH})"
          sed -i "s/^version=.*/version=${NEW_VER}/" module.prop
          sed -i "s/^versionCode=.*/versionCode=$(date +%Y%m%d)/" module.prop

      - name: Get Version
        id: get_version
        run: |
          echo "version=$(grep -oP 'version=\K[^ ]+' module.prop)" >> "$GITHUB_OUTPUT"

      - name: Generate Asset
        run: |
          mkdir -p ./box_for_root
          # 使用 rsync 或排除模式拷贝，避免 sudo 和复杂的 find 逻辑
          cp -r ./ ./box_for_root/
          rm -rf ./box_for_root/.git ./box_for_root/.github
          # 删除不需要打包进模块的文件
          cd ./box_for_root && rm -f CHANGELOG.md update.json build.sh
          rm -rf apks/

      - name: Zip for Release
        # 提前在 build 阶段打包，确保 upload 拿到的就是成品
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          zip -r -o -X -ll "../box_for_root-${VERSION}.zip" ./*
          mv "../box_for_root-${VERSION}.zip" ../

      - name: Upload Debug Artifact
        uses: actions/upload-artifact@v4
        with:
          name: box_release
          path: box_for_root-*.zip

  upload:
    runs-on: ubuntu-latest
    needs: build
    # 只有 commit message 包含 [ci] 才会执行分发逻辑
    if: contains(github.event.head_commit.message, '[ci]')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Asset
        uses: actions/download-artifact@v4
        with:
          name: box_release
          path: ./

      - name: Upload to GitHub Pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          FILE=$(find . -name "box_for_root-*.zip")
          gh release create "pre-${VERSION}" "$FILE" \
            --prerelease \
            --title "Pre-release ${VERSION}" \
            --notes "Pre-release build from commit $(git log -1 --pretty=%h)"

      - name: Upload to Telegram
        env:
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MESSAGE_THREAD_ID: ${{ secrets.MESSAGE_THREAD_ID }}
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          if [ -n "${{ secrets.BOT_TOKEN }}" ]; then
            export VERSION="${{ needs.build.outputs.version }}"
            FILE=$(find . -name "box_for_root-*.zip")
            pip3 install telethon==1.31.1
            python3 .github/boxrootbot.py "$FILE"
          fi
