name: debug

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "apks/**"
      - "README.md"
      - "CHANGELOG.md"
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Module Metadata
        id: get_version
        run: |
          RAW_VER=$(grep 'version=' module.prop | cut -d'=' -f2)
          SHORT_SHA=$(git rev-parse --short HEAD)
          NEW_VER="${RAW_VER}-${SHORT_SHA}"

          sed -i "s/^version=.*/version=${NEW_VER}/" module.prop
          sed -i "s/^versionCode=.*/versionCode=$(date +%s)/" module.prop

          echo "version=${NEW_VER}" >> "$GITHUB_OUTPUT"

      - name: Prepare Debug Asset
        run: |
          mkdir -p ./box_debug_out
          rsync -aL ./ ./box_debug_out/ \
            --exclude='box_debug_out' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='apks' \
            --exclude='CHANGELOG.md' \
            --exclude='update.json' \
            --exclude='build.sh'

      - name: Upload Debug Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "box_for_root_${{ steps.get_version.outputs.version }}"
          path: ./box_debug_out/

  upload:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for [ci] in commit message
        id: check_ci
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Last commit message: $COMMIT_MSG"
          if [[ "$COMMIT_MSG" == *"[ci]"* ]]; then
            echo "should_upload=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_upload=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Built Files
        if: steps.check_ci.outputs.should_upload == 'true'
        uses: actions/download-artifact@v4
        with:
          name: "box_for_root_${{ needs.build.outputs.version }}"
          path: ./release_temp

      - name: Create Release ZIP and Publish
        if: steps.check_ci.outputs.should_upload == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MESSAGE_THREAD_ID: ${{ secrets.MESSAGE_THREAD_ID }}
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          cd ./release_temp
          ZIP_NAME="box_for_root-${{ needs.build.outputs.version }}.zip"
          zip -r "../$ZIP_NAME" ./*
          cd ..

          gh release create "pre-${{ needs.build.outputs.version }}" "$ZIP_NAME" \
            --prerelease \
            --title "Pre-release ${{ needs.build.outputs.version }}" \
            --notes "Build from commit $(git rev-parse --short HEAD)"

          export COMMIT=$(git log --oneline -n 5 --no-decorate | sed 's/^[0-9a-f]* //' | sed 's/^/— /')
          pip3 install -q telethon==1.31.1
          python3 .github/boxrootbot.py "$ZIP_NAME"