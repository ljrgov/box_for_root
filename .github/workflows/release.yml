name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '发布版本标签'
        required: true
      branch:
        description: '推送的目标分支'
        required: true
      changelog:
        description: '变更日志内容'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 生成版本日期
      - name: Get Version
        id: get_version
        run: echo "date=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      # 3. 更新 update.json, module.prop, and CHANGELOG.md
      - name: Update files
        run: |
          # 核心修复：强制统一格式，避免出现 vv 或少 v
          INPUT_TAG="${{ github.event.inputs.tag }}"
          VERSION="v${INPUT_TAG#v}"
          VERSION="${{ github.event.inputs.tag }}"
          DATE_NUM="${{ steps.get_version.outputs.date }}"
          DATE_HUMAN=$(date +%d-%m-%y)
          CHANGELOG="${{ github.event.inputs.changelog }}"

          # update.json
          cat > update.json <<EOF
          {
            "version": "$VERSION",
            "versionCode": "$DATE_NUM",
            "zipUrl": "https://github.com/ljrgov/box_for_root/releases/download/$VERSION/box_for_root-$VERSION.zip",
            "changelog": "https://raw.githubusercontent.com/ljrgov/box_for_root/refs/heads/master/CHANGELOG.md"
          }
          EOF

          # module.prop
          sed -i "s/^version=.*/version=$VERSION/" module.prop
          sed -i "s/^versionCode=.*/versionCode=$DATE_NUM/" module.prop

          # Changelog
          if [ ! -f CHANGELOG.md ]; then
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi
          {
            echo "#### Changelog $VERSION - $DATE_HUMAN"
            echo "$CHANGELOG" | sed 's/^/- /'
            echo ""
            cat CHANGELOG.md
          } > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md

      # 4. 提交推送变更
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add update.json module.prop CHANGELOG.md
          git commit -m "${{ github.event.inputs.tag }}" || echo "No changes to commit"
          git push origin "${{ github.event.inputs.branch }}" --force

      # 5. 运行构建脚本
      - name: Run build.sh
        run: |
          chmod +x build.sh
          ./build.sh

      # 6. 创建GitHub正式发布版本
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: box_for_root-v*.zip
          generate_release_notes: true
          body: |
            #### Changelog v${{ github.event.inputs.tag }}
            ${{ github.event.inputs.changelog }} 

      # 7. 上传到 Telegram
      - name: Upload to Telegram
        env:
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MESSAGE_THREAD_ID: ${{ secrets.MESSAGE_THREAD_ID }}
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          # 核心版本信息
          export VERSION="${{ github.event.inputs.tag }}"
          
          # 显示设置为空
          export COMMIT=""
          
          # 处理日期
          export DATE=$(TZ='Asia/Shanghai' date "+%Y-%m-%d %H:%M")
          
          # 使用双引号包裹 CHANGELOG，防止多行文本破坏 Shell 脚本
          export CHANGELOG="${{ github.event.inputs.changelog }}"
          
          # 查找文件
          FILE=$(find . -name "box_for_root-*.zip" | head -n 1)
          
          if [ -z "$FILE" ]; then
            echo "[-] No zip file found!"
            exit 1
          fi

          pip3 install --quiet telethon==1.31.1
          python3 .github/boxrootbot.py "$FILE"
